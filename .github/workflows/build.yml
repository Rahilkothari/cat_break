name: Build Applications

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build Windows
      if: runner.os == 'Windows'
      run: |
        pyinstaller --noconsole --onefile --add-data "cat_frames;cat_frames" cat_break.py

    - name: Build macOS
      if: runner.os == 'macOS'
      run: |
        pyinstaller --noconsole --onefile --windowed --add-data "cat_frames:cat_frames" cat_break.py
        cd dist
        zip -r cat_break-macos.zip cat_break.app

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: cat_break-${{ matrix.os }}
        path: |
          dist/cat_break.exe
          dist/cat_break-macos.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: Latest Release
          files: |
            artifacts/cat_break.exe
            artifacts/cat_break-macos.zip
