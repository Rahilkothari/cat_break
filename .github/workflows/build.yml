name: Build Applications

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build Windows
      if: runner.os == 'Windows'
      run: |
        pyinstaller --noconsole --onefile --add-data "cat_frames;cat_frames" cat_break.py

    - name: Build macOS
      if: runner.os == 'macOS'
      run: |
        pyinstaller --noconsole --onefile --windowed --add-data "cat_frames:cat_frames" cat_break.py

    - name: Upload Windows Artifact
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: cat_break-windows
        path: dist/cat_break.exe

    - name: Upload macOS Artifact
      if: runner.os == 'macOS'
      uses: actions/upload-artifact@v4
      with:
        name: cat_break-macos
        path: dist/cat_break.app
